<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dynamix — Loading</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-cond: 'Barlow Condensed', sans-serif;
      --font: 'Barlow', sans-serif;
      --ink:    #111111;
      --ink2:   #333333;
      --ink3:   #555555;
      --ink4:   #888888;
      --light:  #cccccc;
      --lighter:#e8e8e8;
      --white:  #ffffff;
    }

    html, body {
      width: 100%; height: 100%;
      background: #ffffff;
      overflow: hidden;
      font-family: var(--font);
    }

    #dx-loader {
      position: fixed; inset: 0;
      background: #ffffff;
      z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    #dx-loader.exit {
      opacity: 0; transform: scale(1.04);
      pointer-events: none;
    }

    /* BG grid — very subtle */
    .dx-grid-bg {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridDrift 10s linear infinite;
    }
    @keyframes gridDrift {
      from { background-position: 0 0; }
      to   { background-position: 40px 40px; }
    }

    /* Corner brackets */
    .dx-corner {
      position: absolute; width: 18px; height: 18px;
      border-color: rgba(0,0,0,0.25); border-style: solid;
    }
    .dx-corner.tl { top:18px; left:18px; border-width:1.5px 0 0 1.5px; }
    .dx-corner.tr { top:18px; right:18px; border-width:1.5px 1.5px 0 0; }
    .dx-corner.bl { bottom:18px; left:18px; border-width:0 0 1.5px 1.5px; }
    .dx-corner.br { bottom:18px; right:18px; border-width:0 1.5px 1.5px 0; }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* =====================
       MAIN LAYOUT
    ===================== */
    .dx-content {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; gap: 0;
      margin-top: -40px;
    }

    /* Machine label */
    .dx-machine-label {
      font-family: var(--font-cond); font-size: 11px; font-weight: 700;
      letter-spacing: 3px; color: var(--ink3);
      text-transform: uppercase; text-align: center;
      margin-bottom: 4px; height: 14px;
      transition: opacity 0.3s ease;
    }

    /* Stage */
    .dx-stage {
      width: 340px; height: 220px;
      position: relative; margin-bottom: -10px;
    }
    .dx-machine-panel {
      position: absolute; inset: 0;
      opacity: 0; transform: scale(0.92);
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none;
    }
    .dx-machine-panel.active {
      opacity: 1; transform: scale(1);
      pointer-events: auto;
    }
    .dx-machine-panel.exiting {
      opacity: 0; transform: scale(0.88) translateY(10px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .dx-machine-svg { width: 100%; height: 100%; overflow: visible; }

    /* Logo */
    .dx-logo-wrap {
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 6px;
      animation: fadeUp 0.8s cubic-bezier(.34,1.56,.64,1) 0.3s both;
    }
    .dx-logo-img { height: 44px; width: auto; object-fit: contain; min-width: 10px; }
    .dx-logo-text {
      font-size: 36px; font-weight: 800; color: var(--ink);
      font-family: var(--font-cond); letter-spacing: 3px; line-height: 1;
      display: none;
    }
    .dx-logo-text span { color: var(--ink3); }

    .dx-tagline {
      font-size: 9px; letter-spacing: 5px;
      color: var(--ink4); font-family: var(--font-cond);
      font-weight: 600; text-transform: uppercase; margin-bottom: 20px;
      animation: fadeUp 0.7s ease 0.6s both;
    }

    /* Progress bar */
    .dx-progress-wrap { width: 280px; animation: fadeUp 0.7s ease 0.7s both; }
    .dx-progress-top {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 6px;
    }
    .dx-progress-label {
      font-size: 8px; letter-spacing: 2px;
      color: var(--ink3); font-family: var(--font-cond);
      font-weight: 700; text-transform: uppercase;
    }
    .dx-progress-pct {
      font-size: 11px; font-weight: 700; color: var(--ink);
      font-family: var(--font-cond); letter-spacing: 1px;
      min-width: 36px; text-align: right;
    }
    .dx-progress-track {
      width: 100%; height: 3px;
      background: var(--lighter); border-radius: 3px;
      overflow: hidden; position: relative;
    }
    .dx-progress-bar {
      height: 100%; width: 0%;
      background: var(--ink);
      border-radius: 3px; position: relative;
      transition: width 0.15s linear;
    }
    .dx-progress-bar::after {
      content: ''; position: absolute;
      right: 0; top: 0; bottom: 0; width: 20px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
      border-radius: 3px;
      animation: barGlint 0.8s ease-in-out infinite;
    }
    @keyframes barGlint { 0%,100%{opacity:0.4;} 50%{opacity:1;} }

    .dx-status {
      margin-top: 10px; font-size: 9px;
      color: var(--ink4); font-family: var(--font-cond);
      letter-spacing: 1.5px; text-transform: uppercase;
      height: 12px; transition: opacity 0.3s ease; text-align: center;
    }

    /* Thumbnail strip */
    .dx-thumbnail-strip {
      position: absolute; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 10px; align-items: flex-end; z-index: 20;
    }
    .dx-thumb {
      width: 70px; height: 46px;
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 3px; overflow: hidden;
      position: relative; opacity: 0;
      transform: translateY(20px) scale(0.6);
      transition: opacity 0.4s ease, transform 0.45s cubic-bezier(.34,1.3,.64,1), border-color 0.3s;
      cursor: default;
    }
    .dx-thumb.visible { opacity: 1; transform: translateY(0) scale(1); }
    .dx-thumb.current-active { border-color: #111; box-shadow: 0 0 6px rgba(0,0,0,0.15); }
    .dx-thumb svg { width: 100%; height: 100%; overflow: hidden; }
    .dx-thumb-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(250,250,250,0.92);
      font-family: var(--font-cond); font-size: 6px;
      font-weight: 700; letter-spacing: 1px;
      color: var(--ink3); text-align: center;
      text-transform: uppercase; padding: 2px;
    }
    .dx-thumb-num {
      position: absolute; top: 2px; left: 3px;
      font-family: var(--font-cond); font-size: 7px;
      font-weight: 800; color: var(--ink4);
    }

    /* =====================
       SVG ANIMATIONS
       KEY FIX: transform-box:fill-box makes transform-origin work relative to the element itself
    ===================== */

    /* --- MILLING --- */
    .cnc-head-group { animation: xAxisMove 2.5s ease-in-out infinite; }
    @keyframes xAxisMove {
      0%{transform:translateX(-30px);} 50%{transform:translateX(30px);} 100%{transform:translateX(-30px);}
    }
    .cnc-z-group { animation: zAxisMove 2.5s ease-in-out infinite; }
    @keyframes zAxisMove {
      0%{transform:translateY(0);} 30%{transform:translateY(10px);} 70%{transform:translateY(10px);} 100%{transform:translateY(0);}
    }
    .cnc-table-group { animation: yAxisMove 2.5s ease-in-out infinite; }
    @keyframes yAxisMove {
      0%{transform:translateY(0);} 50%{transform:translateY(-4px);} 100%{transform:translateY(0);}
    }
    .cnc-chip-fly { opacity:0; animation: chipFly 1.5s ease-out infinite; }
    .cnc-chip-fly:nth-child(1){animation-delay:0s;}
    .cnc-chip-fly:nth-child(2){animation-delay:0.5s;}
    .cnc-chip-fly:nth-child(3){animation-delay:1s;}
    @keyframes chipFly {
      0%{opacity:0;transform:translate(0,0) rotate(0deg);}
      20%{opacity:1;}
      100%{opacity:0;transform:translate(14px,-12px) rotate(180deg);}
    }

    /* --- LATHE --- */
    /* Chuck & spindle muter — transform-box:fill-box adalah kuncinya */
    .lathe-chuck {
      transform-box: fill-box;
      transform-origin: center;
      animation: spin 0.4s linear infinite;
    }
    .lathe-spindle-tip {
      transform-box: fill-box;
      transform-origin: center;
      animation: spin 0.35s linear infinite;
    }
    @keyframes spin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
    .lathe-tool-group { animation: latheToolFeed 3s ease-in-out infinite; }
    @keyframes latheToolFeed {
      0%{transform:translateX(0);} 50%{transform:translateX(-38px);} 100%{transform:translateX(0);}
    }
    .lathe-chip { opacity:0; animation: latheChip 1.2s ease-out infinite; }
    .lathe-chip:nth-child(1){animation-delay:0s;}
    .lathe-chip:nth-child(2){animation-delay:0.4s;}
    .lathe-chip:nth-child(3){animation-delay:0.8s;}
    @keyframes latheChip {
      0%{opacity:0;transform:translate(0,0) rotate(0deg);}
      20%{opacity:1;}
      100%{opacity:0;transform:translate(10px,8px) rotate(120deg);}
    }

    /* --- SPM --- */
    .spm-press { animation: spmPress 1.5s ease-in-out infinite; }
    @keyframes spmPress {
      0%{transform:translateY(0);} 40%{transform:translateY(44px);} 55%{transform:translateY(44px);} 100%{transform:translateY(0);}
    }
    .spm-piston { animation: spmPiston 2s ease-in-out infinite; }
    @keyframes spmPiston {
      0%{transform:translateX(0);} 40%{transform:translateX(28px);} 60%{transform:translateX(28px);} 100%{transform:translateX(0);}
    }
    .spm-conveyor-belt { animation: conveyorMove 1.5s linear infinite; }
    @keyframes conveyorMove { 0%{stroke-dashoffset:0;} 100%{stroke-dashoffset:-30px;} }
    .spm-indicator { animation: spmIndic 1.2s step-start infinite; }
    @keyframes spmIndic { 0%,49%{opacity:1;} 50%,100%{opacity:0.2;} }

    /* --- MOTOR SPINDLE ---
       transform-box:fill-box — rotasi di center elemennya sendiri, bukan di 0,0 SVG */
    .motor-rotor {
      transform-box: fill-box;
      transform-origin: center;
      animation: spin 0.28s linear infinite;
    }
    .inv-bar1 { transform-box:fill-box; transform-origin:bottom; animation: invBar 0.7s ease-in-out infinite alternate; }
    .inv-bar2 { transform-box:fill-box; transform-origin:bottom; animation: invBar 0.7s ease-in-out 0.12s infinite alternate; }
    .inv-bar3 { transform-box:fill-box; transform-origin:bottom; animation: invBar 0.7s ease-in-out 0.24s infinite alternate; }
    .inv-bar4 { transform-box:fill-box; transform-origin:bottom; animation: invBar 0.7s ease-in-out 0.36s infinite alternate; }
    @keyframes invBar { from{transform:scaleY(0.3);} to{transform:scaleY(1);} }

    /* --- SERVO ---
       Sama, transform-box:fill-box */
    .servo-shaft {
      transform-box: fill-box;
      transform-origin: center;
      animation: spin 0.5s linear infinite;
    }
    .servo-encoder-disc {
      transform-box: fill-box;
      transform-origin: center;
      animation: spinR 0.5s linear infinite;
    }
    @keyframes spinR { from{transform:rotate(0deg);} to{transform:rotate(-360deg);} }
    .drive-pulse1 { animation: drivePulse 0.5s steps(2) infinite; }
    .drive-pulse2 { animation: drivePulse 0.5s steps(2) 0.15s infinite; }
    .drive-pulse3 { animation: drivePulse 0.5s steps(2) 0.3s infinite; }
    @keyframes drivePulse { 0%,100%{opacity:0.15;} 50%{opacity:1;} }
    .servo-feedback { animation: servoFb 0.8s ease-in-out infinite alternate; }
    @keyframes servoFb { from{stroke-dashoffset:0;} to{stroke-dashoffset:20px;} }
    .servo-led-ok { animation: ledBlink 1s ease-in-out infinite; }
    @keyframes ledBlink { 0%,100%{opacity:0.4;} 50%{opacity:1;} }

    /* Main content */
    #main-content {
      min-height: 100vh; background: #fff;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-cond); font-size: 28px; font-weight: 700;
      color: #111; letter-spacing: 2px;
    }
  </style>
</head>
<body>

<div id="dx-loader">
  <div class="dx-grid-bg"></div>
  <div class="dx-corner tl"></div>
  <div class="dx-corner tr"></div>
  <div class="dx-corner bl"></div>
  <div class="dx-corner br"></div>

  <div class="dx-content">

    <div class="dx-machine-label" id="dx-machine-label">CNC MILLING</div>

    <div class="dx-stage" id="dx-stage">

      <!-- ================================================
           PANEL 0 — CNC MILLING  (urutan tampil: 1)
      ================================================ -->
      <div class="dx-machine-panel active" id="panel-0">
        <svg class="dx-machine-svg" viewBox="0 0 340 220" xmlns="http://www.w3.org/2000/svg">
          <!-- Base -->
          <rect x="20" y="158" width="300" height="48" rx="3" fill="#e8e8e8" stroke="#111" stroke-width="1.5"/>
          <rect x="20" y="158" width="300" height="4" fill="#bbb"/>
          <!-- Side columns -->
          <rect x="20" y="90" width="16" height="70" fill="#ddd" stroke="#111" stroke-width="1"/>
          <rect x="304" y="90" width="16" height="70" fill="#ddd" stroke="#111" stroke-width="1"/>
          <!-- Top beam -->
          <rect x="36" y="40" width="268" height="54" rx="2" fill="#e0e0e0" stroke="#111" stroke-width="1.2"/>
          <rect x="50" y="46" width="240" height="2" rx="1" fill="#333" opacity="0.7"/>
          <!-- X-Rail -->
          <rect x="36" y="89" width="268" height="7" rx="2" fill="#ccc" stroke="#111" stroke-width="0.8"/>

          <!-- Table (Y-axis) -->
          <g class="cnc-table-group">
            <rect x="58" y="138" width="224" height="22" rx="2" fill="#f0f0f0" stroke="#111" stroke-width="1"/>
            <line x1="98" y1="138" x2="98" y2="160" stroke="#ccc" stroke-width="0.8"/>
            <line x1="138" y1="138" x2="138" y2="160" stroke="#ccc" stroke-width="0.8"/>
            <line x1="178" y1="138" x2="178" y2="160" stroke="#ccc" stroke-width="0.8"/>
            <line x1="218" y1="138" x2="218" y2="160" stroke="#ccc" stroke-width="0.8"/>
            <line x1="258" y1="138" x2="258" y2="160" stroke="#ccc" stroke-width="0.8"/>
            <line x1="58" y1="147" x2="282" y2="147" stroke="#ccc" stroke-width="0.8"/>
            <line x1="58" y1="154" x2="282" y2="154" stroke="#ccc" stroke-width="0.8"/>
            <circle cx="78" cy="149" r="2" fill="#bbb" stroke="#999" stroke-width="0.5"/>
            <circle cx="170" cy="149" r="2" fill="#bbb" stroke="#999" stroke-width="0.5"/>
            <circle cx="262" cy="149" r="2" fill="#bbb" stroke="#999" stroke-width="0.5"/>
            <!-- Workpiece -->
            <rect x="105" y="116" width="130" height="24" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
            <rect x="105" y="116" width="130" height="6" rx="1" fill="#e0e0e0" stroke="#bbb" stroke-width="0.5"/>
            <rect id="milledChannel" x="115" y="116" width="22" height="4" rx="1" fill="#999" stroke="#111" stroke-width="0.5"/>
          </g>

          <!-- Head group (X-axis) -->
          <g class="cnc-head-group">
            <rect x="144" y="84" width="52" height="18" rx="2" fill="#ddd" stroke="#111" stroke-width="1"/>
            <!-- Z group -->
            <g class="cnc-z-group">
              <rect x="157" y="96" width="26" height="38" rx="2" fill="#e8e8e8" stroke="#333" stroke-width="0.8"/>
              <rect x="161" y="98" width="4" height="34" rx="1" fill="#ccc"/>
              <rect x="175" y="98" width="4" height="34" rx="1" fill="#ccc"/>
              <!-- Spindle housing -->
              <rect x="152" y="117" width="36" height="28" rx="3" fill="#fff" stroke="#111" stroke-width="1.2"/>
              <rect x="157" y="121" width="26" height="18" rx="2" fill="#f5f5f5" stroke="#ccc" stroke-width="0.7"/>
              <line x1="159" y1="124" x2="181" y2="124" stroke="#bbb" stroke-width="0.7"/>
              <line x1="159" y1="128" x2="181" y2="128" stroke="#bbb" stroke-width="0.7"/>
              <line x1="159" y1="132" x2="181" y2="132" stroke="#bbb" stroke-width="0.7"/>
              <circle cx="183" cy="123" r="2" fill="#333"/>
              <!-- Spindle tip (static) -->
              <polygon points="165,144 175,144 177,150 163,150" fill="#555" stroke="#111" stroke-width="0.8"/>
              <line x1="170" y1="150" x2="168" y2="162" stroke="#333" stroke-width="1.5"/>
              <line x1="170" y1="150" x2="170" y2="163" stroke="#555" stroke-width="1.5"/>
              <line x1="170" y1="150" x2="172" y2="162" stroke="#333" stroke-width="1.5"/>
              <!-- Chip sparks -->
              <rect class="cnc-chip-fly" x="172" y="152" width="4" height="2" rx="0.5" fill="#555" transform="rotate(30 172 152)"/>
              <rect class="cnc-chip-fly" x="174" y="150" width="3" height="2" rx="0.5" fill="#333" transform="rotate(-15 174 150)"/>
              <rect class="cnc-chip-fly" x="168" y="154" width="4" height="2" rx="0.5" fill="#555" transform="rotate(60 168 154)"/>
            </g>
          </g>

          <!-- Control panel -->
          <rect x="292" y="100" width="22" height="42" rx="2" fill="#eee" stroke="#333" stroke-width="1"/>
          <circle cx="303" cy="110" r="3" fill="#333"/>
          <rect x="297" y="117" width="12" height="5" rx="1" fill="#ccc" stroke="#888" stroke-width="0.5"/>
          <rect x="297" y="125" width="12" height="5" rx="1" fill="#ccc" stroke="#888" stroke-width="0.5"/>
          <rect x="297" y="133" width="5" height="5" rx="1" fill="#555"/>
          <rect x="305" y="133" width="4" height="5" rx="1" fill="#999"/>
          <!-- Shadow -->
          <ellipse cx="170" cy="208" rx="120" ry="4" fill="rgba(0,0,0,0.1)"/>
          <!-- Label -->
          <text x="22" y="175" fill="#888" font-size="7" font-family="Barlow Condensed" font-weight="700" letter-spacing="1">CNC MILLING</text>
        </svg>
      </div>

      <!-- ================================================
           PANEL 2 — SPM MACHINE  (urutan tampil: 2)
      ================================================ -->
      <div class="dx-machine-panel" id="panel-2">
        <svg class="dx-machine-svg" viewBox="0 0 340 220" xmlns="http://www.w3.org/2000/svg">
          <!-- Base -->
          <rect x="30" y="162" width="280" height="38" rx="3" fill="#e8e8e8" stroke="#111" stroke-width="1.5"/>
          <rect x="30" y="162" width="280" height="4" fill="#bbb"/>
          <!-- Left column -->
          <rect x="38" y="50" width="36" height="116" rx="2" fill="#ddd" stroke="#111" stroke-width="1"/>
          <rect x="38" y="50" width="36" height="5" fill="#bbb"/>
          <!-- Right column -->
          <rect x="266" y="50" width="36" height="116" rx="2" fill="#ddd" stroke="#111" stroke-width="1"/>
          <rect x="266" y="50" width="36" height="5" fill="#bbb"/>
          <!-- Top crossbeam -->
          <rect x="34" y="40" width="272" height="16" rx="2" fill="#e0e0e0" stroke="#111" stroke-width="1.2"/>
          <rect x="50" y="45" width="240" height="2" rx="1" fill="#888" opacity="0.6"/>

          <!-- Press ram (moves down) -->
          <g class="spm-press">
            <rect x="128" y="56" width="84" height="58" rx="2" fill="#f0f0f0" stroke="#111" stroke-width="1.2"/>
            <rect x="128" y="56" width="84" height="7" rx="2" fill="#ccc"/>
            <!-- Guide rods -->
            <rect x="136" y="42" width="8" height="28" rx="2" fill="#bbb" stroke="#888" stroke-width="0.8"/>
            <rect x="196" y="42" width="8" height="28" rx="2" fill="#bbb" stroke="#888" stroke-width="0.8"/>
            <!-- Ram face -->
            <rect x="136" y="66" width="68" height="38" rx="2" fill="#e8e8e8" stroke="#aaa" stroke-width="0.8"/>
            <!-- Tool attachment -->
            <rect x="150" y="104" width="40" height="12" rx="2" fill="#ddd" stroke="#111" stroke-width="1"/>
            <rect x="156" y="116" width="28" height="8" rx="1" fill="#888"/>
            <polygon points="162,124 178,124 175,132 165,132" fill="#333" stroke="#111" stroke-width="0.8"/>
          </g>

          <!-- Piston (moves right) -->
          <g class="spm-piston">
            <rect x="73" y="102" width="52" height="22" rx="2" fill="#f0f0f0" stroke="#111" stroke-width="1"/>
            <rect x="73" y="102" width="52" height="5" fill="#ccc"/>
            <rect x="61" y="111" width="16" height="4" rx="2" fill="#bbb" stroke="#888" stroke-width="0.5"/>
            <polygon points="61,109 61,117 53,113" fill="#444" stroke="#111" stroke-width="0.8"/>
          </g>

          <!-- Workpiece -->
          <rect x="118" y="156" width="104" height="10" rx="2" fill="#fff" stroke="#111" stroke-width="1"/>
          <rect x="116" y="153" width="9" height="16" rx="1" fill="#ccc" stroke="#888" stroke-width="0.5"/>
          <rect x="215" y="153" width="9" height="16" rx="1" fill="#ccc" stroke="#888" stroke-width="0.5"/>

          <!-- Conveyor -->
          <rect x="73" y="160" width="194" height="6" rx="2" fill="#f0f0f0" stroke="#333" stroke-width="0.8"/>
          <line x1="83" y1="163" x2="257" y2="163" stroke="#555" stroke-width="0.6" stroke-dasharray="8 6" class="spm-conveyor-belt"/>

          <!-- Control cabinet -->
          <rect x="270" y="58" width="28" height="96" rx="2" fill="#f5f5f5" stroke="#333" stroke-width="1"/>
          <rect x="274" y="64" width="20" height="14" rx="2" fill="#e0e0e0" stroke="#888" stroke-width="0.6"/>
          <text x="284" y="74" fill="#333" font-size="6" font-family="Barlow Condensed" font-weight="700" text-anchor="middle">SPM</text>

          <rect x="262" y="182" width="16" height="12" rx="2" fill="#eee" stroke="#aaa" stroke-width="0.8"/>

          <!-- Shadow -->
          <ellipse cx="200" cy="207" rx="130" ry="4" fill="rgba(0,0,0,0.1)"/>
          <text x="16" y="178" fill="#888" font-size="7" font-family="Barlow Condensed" font-weight="700" letter-spacing="1">SERVO SYSTEM</text>
        </svg>
      </div>

    </div><!-- end stage -->

    <!-- Logo -->
    <div class="dx-logo-wrap">
      <img class="dx-logo-img" src="images/logo.png" alt="Dynamix Vision Automation" id="dx-logo-img"
        onerror="this.style.display='none'; document.getElementById('dx-logo-fallback').style.display='block';"/>
      <div class="dx-logo-text" id="dx-logo-fallback">DYNAMI<span>X</span></div>
    </div>

    <!-- Tagline -->
    <div class="dx-tagline">CNC &amp; Automation Specialist</div>

    <!-- Progress bar -->
    <div class="dx-progress-wrap">
      <div class="dx-progress-top">
        <div class="dx-progress-label" id="dx-progress-label">INITIALIZING SYSTEM</div>
        <div class="dx-progress-pct" id="dx-pct">0%</div>
      </div>
      <div class="dx-progress-track">
        <div class="dx-progress-bar" id="dx-bar"></div>
      </div>
      <div class="dx-status" id="dx-status">Memuat sistem...</div>
    </div>

  </div><!-- end content -->

  <!-- Thumbnail strip -->
  <div class="dx-thumbnail-strip" id="dx-thumbnail-strip"></div>

</div><!-- end loader -->

<div id="main-content" style="display:none">
  <div style="text-align:center">
    <div style="font-size:14px;font-weight:800;letter-spacing:2px;color:#111;font-family:'Barlow Condensed',sans-serif">DYNAMIX VISION AUTOMATION</div>
    <div style="font-size:11px;color:#666;margin-top:8px;font-family:'Barlow',sans-serif;letter-spacing:1px">Website berhasil dimuat ✓</div>
  </div>
</div>

<script>
(function() {

  /* CONFIG */
  const MACHINE_DURATION = 2000; // 2 detik per mesin
  const TOTAL_MACHINES   = 5;
  const EXIT_DELAY       = 600;

  /* Urutan tampil: Milling(0) → SPM(2) → Lathe(1) → Motor(3) → Servo(4) */
  const MACHINES = [
    {
      name: 'CNC MILLING', shortName: 'MILLING',
      statusMessages: ['Menginisialisasi CNC Milling...','Kalibrasi sumbu X, Y, Z...','Spindle aktif — 12000 RPM','CNC Milling siap.']
    },
    {
      name: 'SPM MACHINE', shortName: 'SPM',
      statusMessages: ['Menginisialisasi SPM...','Kalibrasi punch & die...','Konveyor aktif...','SPM siap beroperasi.']
    },
    {
      name: 'CNC BUBUT', shortName: 'LATHE',
      statusMessages: ['Menginisialisasi CNC Bubut...','Kalibrasi chuck & tailstock...','Chuck berputar — 2400 RPM','CNC Bubut siap.']
    },
    {
      name: 'MOTOR SPINDLE', shortName: 'MOTOR',
      statusMessages: ['Menginisialisasi inverter...','Deteksi motor 3 phase...','PWM aktif — Motor berputar...','Motor Spindle siap.']
    },
    {
      name: 'SERVO SYSTEM', shortName: 'SERVO',
      statusMessages: ['Menginisialisasi servo drive...','Pairing encoder 2500 P/R...','Feedback loop aktif...','Servo Drive & Motor siap.']
    },
  ];

  /* DOM REFS */
  const bar        = document.getElementById('dx-bar');
  const pctEl      = document.getElementById('dx-pct');
  const statusEl   = document.getElementById('dx-status');
  const loader     = document.getElementById('dx-loader');
  const content    = document.getElementById('main-content');
  const labelEl    = document.getElementById('dx-machine-label');
  const progLabel  = document.getElementById('dx-progress-label');
  const thumbStrip = document.getElementById('dx-thumbnail-strip');

  // Panels dalam urutan tampil: 1,3,2,4,5 → panel-0, panel-2, panel-1, panel-3, panel-4
  const panels = [
    document.getElementById('panel-0'),
    document.getElementById('panel-2'),
    document.getElementById('panel-1'),
    document.getElementById('panel-3'),
    document.getElementById('panel-4'),
  ];

  /* THUMBNAIL SVGs — hitam putih, urutan: Milling, SPM, Lathe, Motor, Servo */
  function makeMiniMilling() {
    return `<svg viewBox="0 0 70 46" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="34" width="66" height="10" rx="1" fill="#e8e8e8" stroke="#333" stroke-width="0.8"/>
      <rect x="4" y="8" width="62" height="12" rx="1" fill="#ddd" stroke="#333" stroke-width="0.6"/>
      <rect x="4" y="18" width="62" height="14" rx="1" fill="#f0f0f0" stroke="#555" stroke-width="0.5"/>
      <g style="animation:xAxisMove 2.5s ease-in-out infinite">
        <rect x="26" y="16" width="18" height="6" rx="1" fill="#ddd" stroke="#333" stroke-width="0.5"/>
        <rect x="30" y="22" width="10" height="12" rx="1" fill="#eee" stroke="#555" stroke-width="0.5"/>
        <rect x="31" y="30" width="8" height="6" rx="1" fill="#ddd" stroke="#333" stroke-width="0.5"/>
        <line x1="33" y1="36" x2="32" y2="40" stroke="#333" stroke-width="1"/>
        <line x1="35" y1="36" x2="35" y2="41" stroke="#555" stroke-width="1"/>
        <line x1="37" y1="36" x2="38" y2="40" stroke="#333" stroke-width="1"/>
      </g>
      <rect x="8" y="28" width="54" height="6" rx="1" fill="#fff" stroke="#333" stroke-width="0.5"/>
    </svg>`;
  }

  function makeMiniSPM() {
    return `<svg viewBox="0 0 70 46" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="36" width="66" height="8" rx="1" fill="#e8e8e8" stroke="#333" stroke-width="0.8"/>
      <rect x="5" y="4" width="60" height="5" rx="1" fill="#ddd" stroke="#333" stroke-width="0.5"/>
      <rect x="8" y="8" width="14" height="28" rx="1" fill="#ddd" stroke="#333" stroke-width="0.5"/>
      <rect x="48" y="8" width="14" height="28" rx="1" fill="#ddd" stroke="#333" stroke-width="0.5"/>
      <g style="animation:spmPress 1.5s ease-in-out infinite">
        <rect x="22" y="8" width="26" height="18" rx="1" fill="#f0f0f0" stroke="#333" stroke-width="0.6"/>
        <rect x="27" y="26" width="16" height="6" rx="1" fill="#ccc" stroke="#333" stroke-width="0.5"/>
        <polygon points="29,32 41,32 39,36 31,36" fill="#444" stroke="#222" stroke-width="0.5"/>
      </g>
      <rect x="20" y="36" width="30" height="3" rx="1" fill="#fff" stroke="#555" stroke-width="0.4"/>
    </svg>`;
  }

  function makeMiniLathe() {
    return `<svg viewBox="0 0 70 46" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="32" width="66" height="12" rx="1" fill="#e8e8e8" stroke="#333" stroke-width="0.8"/>
      <rect x="2" y="14" width="22" height="20" rx="2" fill="#ddd" stroke="#333" stroke-width="0.6"/>
      <circle cx="17" cy="22" r="7" fill="#f0f0f0" stroke="#333" stroke-width="0.8"/>
      <circle cx="17" cy="22" r="5" fill="#fff" stroke="#888" stroke-width="0.5"/>
      <rect x="17" y="15" width="2" height="4" rx="0.5" fill="#555"/>
      <rect x="17" y="23" width="2" height="4" rx="0.5" fill="#555"/>
      <rect x="12" y="21" width="4" height="2" rx="0.5" fill="#555"/>
      <rect x="20" y="21" width="4" height="2" rx="0.5" fill="#555"/>
      <rect x="24" y="20" width="32" height="4" rx="1" fill="#fff" stroke="#555" stroke-width="0.4"/>
      <rect x="56" y="18" width="12" height="10" rx="2" fill="#ddd" stroke="#333" stroke-width="0.6"/>
      <g style="animation:latheToolFeed 3s ease-in-out infinite">
        <rect x="38" y="26" width="12" height="6" rx="1" fill="#eee" stroke="#555" stroke-width="0.5"/>
        <polygon points="38,23 38,27 33,25" fill="#333"/>
      </g>
    </svg>`;
  }

  function makeMiniMotor() {
    return `<svg viewBox="0 0 70 46" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="8" width="28" height="32" rx="2" fill="#f0f0f0" stroke="#333" stroke-width="0.7"/>
      <rect x="2" y="8" width="28" height="4" rx="2" fill="#333"/>
      <rect x="4" y="14" width="24" height="12" rx="1" fill="#fff" stroke="#555" stroke-width="0.5"/>
      <text x="16" y="22" fill="#222" font-size="5" font-family="Barlow Condensed" font-weight="700" text-anchor="middle">50Hz</text>
      <rect x="4" y="28" width="7" height="6" rx="0.5" fill="#eee" stroke="#888" stroke-width="0.3"/><rect x="4" y="28" width="7" height="6" rx="0.5" fill="#555" class="inv-bar1" style="transform-box:fill-box;transform-origin:bottom"/>
      <rect x="13" y="28" width="7" height="6" rx="0.5" fill="#eee" stroke="#888" stroke-width="0.3"/><rect x="13" y="28" width="7" height="6" rx="0.5" fill="#555" class="inv-bar2" style="transform-box:fill-box;transform-origin:bottom"/>
      <rect x="22" y="28" width="7" height="6" rx="0.5" fill="#eee" stroke="#888" stroke-width="0.3"/><rect x="22" y="28" width="7" height="6" rx="0.5" fill="#555" class="inv-bar3" style="transform-box:fill-box;transform-origin:bottom"/>
      <line x1="30" y1="20" x2="38" y2="20" stroke="#555" stroke-width="1"/>
      <line x1="30" y1="24" x2="38" y2="24" stroke="#888" stroke-width="1"/>
      <rect x="38" y="10" width="30" height="28" rx="2" fill="#e8e8e8" stroke="#333" stroke-width="0.7"/>
      <circle cx="53" cy="24" r="10" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <g class="motor-rotor" style="transform-box:fill-box;transform-origin:center">
        <circle cx="53" cy="24" r="8" fill="none" stroke="none"/>
        <line x1="53" y1="14" x2="53" y2="34" stroke="#555" stroke-width="1"/>
        <line x1="43" y1="24" x2="63" y2="24" stroke="#555" stroke-width="1"/>
        <rect x="49" y="15" width="8" height="5" rx="0.5" fill="#333"/>
        <rect x="49" y="30" width="8" height="5" rx="0.5" fill="#aaa"/>
      </g>
      <circle cx="53" cy="24" r="3" fill="#555" stroke="#111" stroke-width="0.5"/>
      <circle cx="53" cy="24" r="1.5" fill="#fff"/>
    </svg>`;
  }

  function makeMiniServo() {
    return `<svg viewBox="0 0 70 46" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="4" width="26" height="38" rx="2" fill="#f0f0f0" stroke="#333" stroke-width="0.7"/>
      <rect x="2" y="4" width="26" height="4" rx="2" fill="#222"/>
      <rect x="4" y="10" width="22" height="10" rx="1" fill="#fff" stroke="#555" stroke-width="0.5"/>
      <text x="15" y="17" fill="#222" font-size="5" font-family="Barlow Condensed" font-weight="700" text-anchor="middle">3000r</text>
      <rect x="4" y="22" width="4" height="6" rx="0.5" fill="#333" class="drive-pulse1"/>
      <rect x="10" y="22" width="4" height="6" rx="0.5" fill="#333" class="drive-pulse2"/>
      <rect x="16" y="22" width="4" height="6" rx="0.5" fill="#333" class="drive-pulse3"/>
      <circle cx="8" cy="36" r="2" fill="#333"/>
      <circle cx="16" cy="36" r="2" fill="#888"/>
      <line x1="28" y1="20" x2="34" y2="20" stroke="#555" stroke-width="1"/>
      <line x1="28" y1="24" x2="34" y2="24" stroke="#888" stroke-width="1"/>
      <line x1="28" y1="28" x2="34" y2="28" stroke="#555" stroke-width="0.8" stroke-dasharray="3 2"/>
      <rect x="34" y="12" width="26" height="24" rx="2" fill="#e8e8e8" stroke="#333" stroke-width="0.7"/>
      <circle cx="47" cy="24" r="9" fill="#fff" stroke="#333" stroke-width="0.8"/>
      <g class="servo-shaft" style="transform-box:fill-box;transform-origin:center">
        <circle cx="47" cy="24" r="7" fill="none" stroke="none"/>
        <line x1="47" y1="15" x2="47" y2="33" stroke="#444" stroke-width="1.2"/>
        <line x1="38" y1="24" x2="56" y2="24" stroke="#444" stroke-width="1.2"/>
        <rect x="44" y="16" width="6" height="4" rx="0.5" fill="#333"/>
        <rect x="44" y="29" width="6" height="4" rx="0.5" fill="#aaa"/>
      </g>
      <circle cx="47" cy="24" r="3" fill="#555" stroke="#111" stroke-width="0.5"/>
      <circle cx="47" cy="24" r="1.5" fill="#fff"/>
      <rect x="60" y="18" width="8" height="12" rx="2" fill="#f5f5f5" stroke="#555" stroke-width="0.5"/>
      <text x="64" y="25" fill="#888" font-size="4" font-family="Barlow Condensed" font-weight="700" text-anchor="middle">ENC</text>
    </svg>`;
  }

  const MINI_SVGs = [makeMiniMilling, makeMiniSPM, makeMiniLathe, makeMiniMotor, makeMiniServo];

  /* STATE */
  let currentMachine = 0;
  let thumbEls = [];
  const progressStart = performance.now();
  const TOTAL_DURATION = MACHINE_DURATION * TOTAL_MACHINES;

  /* PROGRESS */
  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
  function tickProgress() {
    const elapsed = performance.now() - progressStart;
    const raw = Math.min(elapsed / TOTAL_DURATION, 1);
    const pct = Math.round(easeOut(raw) * 100);
    bar.style.width = pct + '%';
    pctEl.textContent = pct + '%';
    if (raw < 1) requestAnimationFrame(tickProgress);
  }
  requestAnimationFrame(tickProgress);

  /* STATUS MESSAGES */
  let msgTimers = [];
  function setStatusMessages(machineIdx) {
    msgTimers.forEach(clearTimeout);
    msgTimers = [];
    const msgs = MACHINES[machineIdx].statusMessages;
    const interval = MACHINE_DURATION / msgs.length;
    msgs.forEach((msg, i) => {
      const t = setTimeout(() => {
        statusEl.style.opacity = '0';
        setTimeout(() => { statusEl.textContent = msg; statusEl.style.opacity = '1'; }, 150);
      }, i * interval);
      msgTimers.push(t);
    });
  }

  /* THUMBNAIL */
  function createThumb(machineIdx) {
    const thumb = document.createElement('div');
    thumb.className = 'dx-thumb';
    thumb.id = `thumb-${machineIdx}`;

    const numEl = document.createElement('div');
    numEl.className = 'dx-thumb-num';
    numEl.textContent = machineIdx + 1;

    const svgWrap = document.createElement('div');
    svgWrap.style.cssText = 'position:absolute;inset:0;overflow:hidden;';
    svgWrap.innerHTML = MINI_SVGs[machineIdx]();

    const lbl = document.createElement('div');
    lbl.className = 'dx-thumb-label';
    lbl.textContent = MACHINES[machineIdx].shortName;

    thumb.appendChild(numEl);
    thumb.appendChild(svgWrap);
    thumb.appendChild(lbl);
    thumbStrip.appendChild(thumb);
    thumbEls.push(thumb);

    requestAnimationFrame(() => requestAnimationFrame(() => thumb.classList.add('visible')));
  }

  /* MACHINE TRANSITION */
  function showMachine(idx) {
    thumbEls.forEach(t => t.classList.remove('current-active'));
    labelEl.style.opacity = '0';
    setTimeout(() => { labelEl.textContent = MACHINES[idx].name; labelEl.style.opacity = '1'; }, 200);

    const prev = panels[currentMachine];
    const next = panels[idx];
    if (prev) {
      prev.classList.add('exiting');
      prev.classList.remove('active');
      setTimeout(() => prev.classList.remove('exiting'), 500);
    }
    setTimeout(() => next.classList.add('active'), 100);
    currentMachine = idx;
    setStatusMessages(idx);
    progLabel.textContent = `LOADING ${MACHINES[idx].name}`;
  }

  /* SEQUENCE */
  function startSequence() {
    setStatusMessages(0);
    labelEl.textContent = MACHINES[0].name;
    progLabel.textContent = `LOADING ${MACHINES[0].name}`;

    for (let i = 0; i < TOTAL_MACHINES; i++) {
      const delay = i * MACHINE_DURATION;
      setTimeout(() => {
        createThumb(i);
        setTimeout(() => {
          const t = document.getElementById(`thumb-${i}`);
          if (t) t.classList.add('current-active');
        }, 200);
        if (i + 1 < TOTAL_MACHINES) {
          setTimeout(() => {
            const t = document.getElementById(`thumb-${i}`);
            if (t) t.classList.remove('current-active');
            showMachine(i + 1);
          }, 600);
        }
      }, delay + MACHINE_DURATION - 200);
    }

    const totalDelay = TOTAL_MACHINES * MACHINE_DURATION + EXIT_DELAY;
    setTimeout(() => {
      progLabel.textContent = 'SYSTEM READY';
      statusEl.textContent = 'Semua sistem aktif. Memuat website...';
      bar.style.width = '100%';
      pctEl.textContent = '100%';
      setTimeout(hideLoader, 800);
    }, totalDelay);
  }

  /* HIDE */
  function hideLoader() {
    if (loader) {
      loader.classList.add('exit');
      setTimeout(() => {
        loader.style.display = 'none';
        if (content) content.style.display = 'flex';
      }, 750);
    }
  }

  /* MILLED CHANNEL GROW */
  const milledChannel = document.getElementById('milledChannel');
  let channelW = 22;
  const channelTimer = setInterval(() => {
    channelW = Math.min(channelW + 0.6, 95);
    if (milledChannel) milledChannel.setAttribute('width', channelW);
    if (channelW >= 95) clearInterval(channelTimer);
  }, 150);

  startSequence();

})();
</script>

</body>
</html>
