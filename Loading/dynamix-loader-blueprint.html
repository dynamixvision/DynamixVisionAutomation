<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dynamix — Loading</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* TECHNICAL DRAWING PALETTE */
  --bg:       #0a0a0a;        /* kertas hitam */
  --bg2:      #111111;
  --line:     #ffffff;        /* garis utama putih */
  --line2:    rgba(255,255,255,0.55); /* garis sekunder */
  --line3:    rgba(255,255,255,0.2);  /* garis tersier / hatch */
  --line4:    rgba(255,255,255,0.08); /* grid */
  --fill:     #0a0a0a;        /* fill komponen = sama dengan bg (outlines only) */
  --fill2:    #141414;        /* fill sedikit terang */
  --fill3:    #1a1a1a;
  --accent:   rgba(255,255,255,0.9);  /* teks / highlight */
  --dim:      rgba(255,255,255,0.35); /* dimension lines */
  --font:     'Barlow Condensed', sans-serif;
  --fontb:    'Barlow', sans-serif;
}

html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:var(--fontb)}

#dx-loader{
  position:fixed;inset:0;background:var(--bg);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;
  transition:opacity .8s ease,transform .8s ease;
}
#dx-loader.exit{opacity:0;transform:scale(1.04);pointer-events:none}

/* ── BACKGROUND: engineering grid (fine) ── */
.dx-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(var(--line4) 1px, transparent 1px),
    linear-gradient(90deg, var(--line4) 1px, transparent 1px),
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 80px 80px, 80px 80px, 20px 20px, 20px 20px;
}
/* center crosshair */
.dx-cross{
  position:absolute;top:50%;left:50%;
  width:30px;height:30px;
  transform:translate(-50%,-50%);
  opacity:.15;
}
.dx-cross::before,.dx-cross::after{
  content:'';position:absolute;background:#fff;
}
.dx-cross::before{width:1px;height:100%;left:50%;}
.dx-cross::after{height:1px;width:100%;top:50%;}

/* corner brackets — heavier, more technical */
.dx-c{position:absolute;width:28px;height:28px;border-color:rgba(255,255,255,0.5);border-style:solid}
.dx-c.tl{top:16px;left:16px;border-width:1px 0 0 1px}
.dx-c.tr{top:16px;right:16px;border-width:1px 1px 0 0}
.dx-c.bl{bottom:16px;left:16px;border-width:0 0 1px 1px}
.dx-c.br{bottom:16px;right:16px;border-width:0 1px 1px 0}
/* corner tick marks */
.dx-c::after{
  content:'';position:absolute;background:rgba(255,255,255,0.3);
}
.dx-c.tl::after,.dx-c.tr::after{top:-5px;width:1px;height:4px;left:50%}
.dx-c.bl::after,.dx-c.br::after{bottom:-5px;width:1px;height:4px;left:50%}

/* border frame line */
.dx-frame{
  position:absolute;
  top:10px;left:10px;right:10px;bottom:10px;
  border:1px solid rgba(255,255,255,0.06);
  pointer-events:none;
}

/* title block bottom-right (gambar teknik style) */
.dx-titleblock{
  position:absolute;bottom:10px;right:10px;
  border:1px solid rgba(255,255,255,0.15);
  padding:5px 10px;
  font-family:var(--font);
  font-size:7px;
  letter-spacing:1.5px;
  color:rgba(255,255,255,0.3);
  text-transform:uppercase;
  line-height:1.8;
}
.dx-titleblock span{color:rgba(255,255,255,.5);font-weight:700}

/* HUD top right */
.dx-hud{
  position:absolute;top:18px;right:46px;
  display:flex;align-items:center;gap:6px;
  font-size:8px;color:rgba(255,255,255,.4);
  font-family:var(--font);letter-spacing:1.5px;
}
.dx-hud-dot{
  width:5px;height:5px;border-radius:50%;
  background:#fff;opacity:.8;
  animation:blink 2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:.8}50%{opacity:.15}}

/* axis readout - bottom left, monospace style */
.dx-axis{
  position:absolute;bottom:76px;left:22px;
  font-family:var(--font);font-size:9px;
  color:rgba(255,255,255,.25);letter-spacing:1.5px;line-height:2;
  border-left:1px solid rgba(255,255,255,.1);
  padding-left:8px;
}

/* ── STAGE ── */
#dx-stage{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  width:100%;
}

/* ── LOGO ── */
.dx-logo-row{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  margin-top:6px;
}
.dx-logo-img{
  height:36px;width:auto;object-fit:contain;
  /* invert to make logo white on black bg */
  filter:brightness(0) invert(1);
  opacity:.9;
}
.dx-logo-txt{
  font-size:32px;font-weight:800;color:#fff;
  font-family:var(--font);letter-spacing:4px;line-height:1;display:none;
}
.dx-tagline{
  font-size:8px;letter-spacing:5px;
  color:rgba(255,255,255,.25);
  font-family:var(--font);font-weight:600;text-transform:uppercase;
}

/* machine label */
.dx-mlabel{
  font-size:10px;font-weight:700;
  color:rgba(255,255,255,.6);
  font-family:var(--font);letter-spacing:3px;text-transform:uppercase;
  margin-top:8px;height:14px;
  border-bottom:1px solid rgba(255,255,255,.1);
  padding-bottom:4px;
  transition:opacity .3s;
}

/* ── PROGRESS BAR — drawing style ── */
.dx-prog-wrap{width:280px;margin-top:12px;z-index:10;position:relative}
.dx-prog-top{display:flex;justify-content:space-between;margin-bottom:5px}
.dx-prog-lbl{
  font-size:7px;letter-spacing:2.5px;
  color:rgba(255,255,255,.35);
  font-family:var(--font);font-weight:700;text-transform:uppercase;
}
.dx-prog-pct{
  font-size:10px;font-weight:700;
  color:rgba(255,255,255,.8);
  font-family:var(--font);letter-spacing:1px;
}
.dx-prog-track{
  width:100%;height:2px;
  background:rgba(255,255,255,.08);
  overflow:hidden;position:relative;
}
/* tick marks on track */
.dx-prog-track::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    90deg,
    transparent 0px,
    transparent 24px,
    rgba(255,255,255,.12) 24px,
    rgba(255,255,255,.12) 25px
  );
}
.dx-prog-bar{
  height:100%;width:0%;
  background:#fff;
  position:relative;
  transition:width .15s linear;
}
.dx-prog-bar::after{
  content:'';position:absolute;right:0;top:-3px;bottom:-3px;
  width:1px;background:rgba(255,255,255,.8);
}
.dx-status{
  margin-top:8px;font-size:8px;
  color:rgba(255,255,255,.2);
  font-family:var(--font);letter-spacing:2px;text-transform:uppercase;
  text-align:center;height:12px;
  transition:opacity .3s;
}

/* ── THUMBNAIL SHELF ── */
#dx-shelf{
  position:absolute;bottom:20px;left:50%;
  transform:translateX(-50%);
  display:flex;gap:8px;z-index:20;
  align-items:flex-end;height:72px;
}
.dx-thumb{
  width:82px;height:62px;
  border:1px solid rgba(255,255,255,.12);
  border-radius:2px;
  background:#0a0a0a;
  overflow:hidden;position:relative;flex-shrink:0;
  opacity:0;transform:scale(.5) translateY(20px);
  transition:opacity .5s ease,transform .5s cubic-bezier(.34,1.56,.64,1);
}
.dx-thumb.show{opacity:1;transform:scale(1) translateY(0)}
.dx-thumb.current{
  border-color:rgba(255,255,255,.55);
  box-shadow:0 0 0 1px rgba(255,255,255,.1);
}
.dx-thumb svg{width:100%;height:100%;overflow:visible}
.dx-thumb-lbl{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.8);
  font-size:5.5px;font-weight:700;color:rgba(255,255,255,.5);
  font-family:var(--font);letter-spacing:.8px;text-transform:uppercase;
  text-align:center;padding:2px 0;
  border-top:1px solid rgba(255,255,255,.08);
}

/* ── KEYFRAMES ── */
@keyframes millX{0%{transform:translateX(-30px)}50%{transform:translateX(30px)}100%{transform:translateX(-30px)}}
@keyframes millZ{0%{transform:translateY(0)}25%{transform:translateY(10px)}75%{transform:translateY(10px)}100%{transform:translateY(0)}}
@keyframes millY{0%{transform:translateY(0)}50%{transform:translateY(-4px)}100%{transform:translateY(0)}}
@keyframes spindleRot{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes chipFly{0%{opacity:0;transform:translate(0,0) rotate(0)}20%{opacity:.9}100%{opacity:0;transform:translate(14px,-12px) rotate(180deg)}}
@keyframes coolDrip{0%{opacity:0;transform:translateY(0)}20%{opacity:.5}100%{opacity:0;transform:translateY(16px)}}
@keyframes glint{from{opacity:.2}to{opacity:.8}}
@keyframes latheSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes latheCarriage{0%{transform:translateX(0)}50%{transform:translateX(-50px)}100%{transform:translateX(0)}}
@keyframes latheChip{0%{opacity:0;transform:translate(0,0) rotate(0)}20%{opacity:.9}100%{opacity:0;transform:translate(-16px,-10px) rotate(120deg)}}
@keyframes spmArm{0%,100%{transform:rotate(-15deg)}50%{transform:rotate(15deg)}}
@keyframes spmPress{0%,100%{transform:translateY(0)}40%,60%{transform:translateY(22px)}}
@keyframes spmConveyor{from{stroke-dashoffset:0}to{stroke-dashoffset:-20}}
@keyframes ledBlink{0%,100%{opacity:.9}50%{opacity:.2}}
@keyframes motorRot{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes waveFlow{from{stroke-dashoffset:60}to{stroke-dashoffset:0}}
@keyframes servoShaft{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes servoEnc{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
@keyframes dataFlow{from{stroke-dashoffset:40}to{stroke-dashoffset:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes dimLine{0%,100%{opacity:.15}50%{opacity:.5}}
</style>
</head>
<body>

<div id="dx-loader">
  <div class="dx-grid"></div>
  <div class="dx-cross"></div>
  <div class="dx-frame"></div>
  <div class="dx-c tl"></div><div class="dx-c tr"></div>
  <div class="dx-c bl"></div><div class="dx-c br"></div>

  <div class="dx-hud"><div class="dx-hud-dot"></div>SYSTEM READY</div>

  <!-- Title block (pojok kiri bawah, gaya gambar teknik) -->
  <div class="dx-titleblock">
    <div>Project: <span>DYNAMIX LOADER v2.0</span></div>
    <div>Scale: <span>1:1</span> &nbsp; Sheet: <span>1/5</span></div>
    <div>Drawn: <span>DYNAMIX VISION AUTOMATION</span></div>
  </div>

  <div class="dx-axis">
    <div>X: <span id="axX">+127.340</span> mm</div>
    <div>Y: <span id="axY">+089.220</span> mm</div>
    <div>Z: <span id="axZ">-012.450</span> mm</div>
    <div style="opacity:.5;margin-top:2px">S: <span id="axRPM">12000</span> rpm</div>
  </div>

  <div id="dx-stage">
    <div id="dx-active-wrap" style="display:flex;align-items:center;justify-content:center;width:360px;height:240px"></div>

    <div class="dx-logo-row">
      <img class="dx-logo-img" src="images/logo.png" alt="Dynamix"
        onerror="this.style.display='none';document.getElementById('dxlt').style.display='block'"/>
      <div class="dx-logo-txt" id="dxlt">DYNAMIX</div>
      <div class="dx-tagline">CNC &amp; Automation Specialist</div>
    </div>

    <div class="dx-mlabel" id="dx-mlabel">CNC MILLING</div>

    <div class="dx-prog-wrap">
      <div class="dx-prog-top">
        <div class="dx-prog-lbl">Initializing System</div>
        <div class="dx-prog-pct" id="dx-pct">0%</div>
      </div>
      <div class="dx-prog-track"><div class="dx-prog-bar" id="dx-bar"></div></div>
      <div class="dx-status" id="dx-status">Memuat sistem...</div>
    </div>
  </div>

  <div id="dx-shelf"></div>
</div>

<div id="main-site" style="display:none;min-height:100vh;background:#f5f7fa;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:#1D6FD8;letter-spacing:2px">
  DYNAMIX VISION AUTOMATION — WEBSITE LOADED ✓
</div>

<script>
/* ================================================================
   TECHNICAL DRAWING COLOR CONSTANTS
   Semua SVG memakai palet gambar teknik:
   - fill komponen: #0a0a0a (hitam) atau #111 / #141414
   - stroke/garis: #fff atau rgba(255,255,255,x)
   - hatch: stroke-dasharray dengan opacity rendah
   - teks dimensi: rgba(255,255,255,0.4)
================================================================ */
const W='#ffffff', W8='rgba(255,255,255,.8)', W6='rgba(255,255,255,.6)',
      W4='rgba(255,255,255,.4)', W2='rgba(255,255,255,.2)', W1='rgba(255,255,255,.1)',
      B='#0a0a0a', B1='#111111', B2='#141414', B3='#1a1a1a';

function svgMilling(w,h){
  return `<svg viewBox="0 0 340 220" width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
  <defs>
    <filter id="mg${w}"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ms${w}"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <!-- hatch pattern for filled areas -->
    <pattern id="hatch${w}" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- BASE -->
  <rect x="20" y="155" width="300" height="50" rx="2" fill="${B2}" stroke="${W6}" stroke-width="1.2"/>
  <rect x="20" y="155" width="300" height="50" rx="2" fill="url(#hatch${w})"/>
  <line x1="20" y1="165" x2="320" y2="165" stroke="${W2}" stroke-width=".8"/>
  <!-- dimension arrow: base width -->
  <line x1="20" y1="212" x2="320" y2="212" stroke="${W2}" stroke-width=".5" stroke-dasharray="3 3"/>
  <text x="170" y="210" fill="${W2}" font-size="6" font-family="Barlow Condensed" text-anchor="middle" letter-spacing=".5">300</text>
  <!-- side columns -->
  <rect x="20" y="90" width="18" height="68" fill="${B1}" stroke="${W4}" stroke-width="1"/>
  <rect x="302" y="90" width="18" height="68" fill="${B1}" stroke="${W4}" stroke-width="1"/>
  <!-- GANTRY COLUMN -->
  <rect x="38" y="40" width="264" height="55" rx="2" fill="${B2}" stroke="${W6}" stroke-width="1.2"/>
  <line x1="38" y1="48" x2="302" y2="48" stroke="${W2}" stroke-width=".6"/>
  <line x1="38" y1="56" x2="302" y2="56" stroke="${W2}" stroke-width=".6"/>
  <!-- column hatch -->
  <rect x="38" y="40" width="264" height="55" rx="2" fill="url(#hatch${w})" opacity=".4"/>
  <!-- X RAIL -->
  <rect x="38" y="88" width="264" height="8" rx="1" fill="${B3}" stroke="${W8}" stroke-width="1"/>
  <circle cx="55" cy="92" r="2" fill="${B}" stroke="${W6}" stroke-width=".8"/>
  <circle cx="285" cy="92" r="2" fill="${B}" stroke="${W6}" stroke-width=".8"/>
  <!-- dimension line X -->
  <line x1="38" y1="80" x2="302" y2="80" stroke="${W1}" stroke-width=".5" stroke-dasharray="4 4" style="animation:dimLine 3s ease-in-out infinite"/>
  <text x="170" y="79" fill="${W2}" font-size="6" font-family="Barlow Condensed" text-anchor="middle" letter-spacing=".5">X-AXIS</text>
  <!-- TABLE Y -->
  <g style="animation:millY 3s ease-in-out infinite">
    <rect x="60" y="138" width="220" height="20" rx="2" fill="${B2}" stroke="${W6}" stroke-width="1"/>
    <!-- T-slot lines -->
    <line x1="100" y1="138" x2="100" y2="158" stroke="${W2}" stroke-width="1"/>
    <line x1="140" y1="138" x2="140" y2="158" stroke="${W2}" stroke-width="1"/>
    <line x1="180" y1="138" x2="180" y2="158" stroke="${W2}" stroke-width="1"/>
    <line x1="220" y1="138" x2="220" y2="158" stroke="${W2}" stroke-width="1"/>
    <line x1="60" y1="148" x2="280" y2="148" stroke="${W2}" stroke-width=".8"/>
    <!-- workpiece -->
    <rect x="110" y="118" width="120" height="22" rx="1" fill="${B3}" stroke="${W8}" stroke-width="1"/>
    <rect x="110" y="118" width="120" height="22" rx="1" fill="url(#hatch${w})" opacity=".6"/>
    <!-- milled channel -->
    <rect x="120" y="118" width="60" height="6" rx="0" fill="${B}" stroke="${W4}" stroke-width=".8"/>
  </g>
  <!-- HEAD X-AXIS -->
  <g style="animation:millX 3s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 50%">
    <rect x="145" y="84" width="50" height="18" rx="2" fill="${B2}" stroke="${W8}" stroke-width="1.2"/>
    <!-- Z AXIS -->
    <g style="animation:millZ 3s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 0%">
      <rect x="158" y="96" width="24" height="36" rx="1" fill="${B1}" stroke="${W4}" stroke-width="1"/>
      <!-- Z dimension line -->
      <line x1="154" y1="96" x2="154" y2="132" stroke="${W1}" stroke-width=".5" stroke-dasharray="3 3"/>
      <text x="152" y="116" fill="${W2}" font-size="5" font-family="Barlow Condensed" text-anchor="middle" transform="rotate(-90 152 116)">Z</text>
      <!-- spindle housing -->
      <rect x="153" y="116" width="34" height="28" rx="3" fill="${B2}" stroke="${W8}" stroke-width="1.2"/>
      <rect x="158" y="120" width="24" height="18" rx="2" fill="${B}" stroke="${W4}" stroke-width=".8"/>
      <!-- center lines (gambar teknik) -->
      <line x1="162" y1="129" x2="178" y2="129" stroke="${W2}" stroke-width=".6" stroke-dasharray="4 2 1 2"/>
      <line x1="170" y1="121" x2="170" y2="137" stroke="${W2}" stroke-width=".6" stroke-dasharray="4 2 1 2"/>
      <!-- spindle rotating -->
      <g style="animation:spindleRot .3s linear infinite;transform-box:fill-box;transform-origin:50% 50%">
        <polygon points="166,142 174,142 176,148 164,148" fill="${B2}" stroke="${W6}" stroke-width=".8"/>
        <line x1="168" y1="148" x2="166" y2="159" stroke="${W}" stroke-width="1.5"/>
        <line x1="170" y1="148" x2="170" y2="161" stroke="${W8}" stroke-width="1.5"/>
        <line x1="172" y1="148" x2="174" y2="159" stroke="${W}" stroke-width="1.5"/>
      </g>
      <!-- tool glow (white) -->
      <circle cx="170" cy="128" r="5" fill="rgba(255,255,255,.05)" filter="url(#ms${w})" style="animation:glint .4s ease-in-out infinite alternate"/>
      <!-- coolant (white dots) -->
      <circle style="animation:coolDrip 1s ease-in infinite" cx="165" cy="156" r="1.5" fill="${W6}" filter="url(#mg${w})"/>
      <circle style="animation:coolDrip 1s ease-in infinite;animation-delay:.35s" cx="170" cy="156" r="1.5" fill="${W6}" filter="url(#mg${w})"/>
      <circle style="animation:coolDrip 1s ease-in infinite;animation-delay:.7s" cx="175" cy="156" r="1.5" fill="${W6}" filter="url(#mg${w})"/>
      <!-- chips (white) -->
      <rect style="animation:chipFly 1.5s ease-out infinite" x="172" y="150" width="4" height="2" rx=".5" fill="${W8}"/>
      <rect style="animation:chipFly 1.5s ease-out infinite;animation-delay:.5s" x="168" y="152" width="3" height="2" rx=".5" fill="${W6}"/>
    </g>
  </g>
  <!-- LABEL -->
  <text x="170" y="36" fill="${W4}" font-size="7" font-family="Barlow Condensed" font-weight="700" text-anchor="middle" letter-spacing="2">CNC MILLING MACHINE</text>
  <!-- shadow line -->
  <ellipse cx="170" cy="207" rx="120" ry="4" fill="rgba(255,255,255,.03)"/>
</svg>`;
}

function svgLathe(w,h){
  return `<svg viewBox="0 0 340 220" width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
  <defs>
    <filter id="lg${w}"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="lhatch${w}" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="rgba(255,255,255,.07)" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- BED -->
  <rect x="15" y="160" width="310" height="40" rx="2" fill="${B2}" stroke="${W6}" stroke-width="1.2"/>
  <rect x="15" y="160" width="310" height="40" fill="url(#lhatch${w})"/>
  <!-- guide ways -->
  <rect x="30" y="148" width="280" height="14" rx="1" fill="${B3}" stroke="${W8}" stroke-width="1"/>
  <line x1="30" y1="153" x2="310" y2="153" stroke="${W2}" stroke-width=".6"/>
  <line x1="30" y1="158" x2="310" y2="158" stroke="${W2}" stroke-width=".6"/>
  <!-- center line (gambar teknik bubut) -->
  <line x1="15" y1="130" x2="325" y2="130" stroke="${W2}" stroke-width=".6" stroke-dasharray="12 4 2 4"/>
  <!-- HEADSTOCK -->
  <rect x="15" y="80" width="72" height="82" rx="2" fill="${B2}" stroke="${W8}" stroke-width="1.2"/>

/* ── CONFIG ── */
const MACHINES = [
  { id:'mill',     label:'CNC MILLING',              status:'Memuat driver CNC...',          svgFn: svgMilling  },
  { id:'lathe',    label:'CNC BUBUT / TURNING',       status:'Inisialisasi spindle bubut...',  svgFn: svgLathe    },
  { id:'spm',      label:'SPECIAL PURPOSE MACHINE',   status:'Kalibrasi sistem SPM...',        svgFn: svgSPM      },
  { id:'inverter', label:'MOTOR SPINDLE + INVERTER',  status:'Setting frekuensi VFD...',       svgFn: svgInverter },
  { id:'servo',    label:'SERVO DRIVE + MOTOR',       status:'Tuning parameter servo...',      svgFn: svgServo    },
];
const STEP = 5000, TRANS = 700, TOTAL = MACHINES.length * STEP;

const activeWrap = document.getElementById('dx-active-wrap');
const shelf      = document.getElementById('dx-shelf');
const bar        = document.getElementById('dx-bar');
const pctEl      = document.getElementById('dx-pct');
const statusEl   = document.getElementById('dx-status');
const mlabel     = document.getElementById('dx-mlabel');
const loader     = document.getElementById('dx-loader');
const titleSheet = loader.querySelector('.dx-titleblock div:nth-child(2)');

/* build thumbnails */
const thumbEls = [];
MACHINES.forEach((m,i) => {
  const t = document.createElement('div');
  t.className = 'dx-thumb';
  t.innerHTML = m.svgFn(82,62) +
    `<div class="dx-thumb-lbl">${m.label.split(' ').slice(0,2).join(' ')}</div>`;
  shelf.appendChild(t);
  thumbEls.push(t);
});

/* progress */
const t0 = Date.now();
setInterval(() => {
  const p = Math.min((Date.now()-t0)/TOTAL*100, 100);
  bar.style.width = p+'%';
  pctEl.textContent = Math.round(p)+'%';
}, 80);

/* axis flicker */
let bx=127.34,by=89.22,bz=-12.45;
setInterval(() => {
  bx+=(Math.random()-.5)*2.5; by+=(Math.random()-.5)*1.2; bz+=(Math.random()-.5)*0.8;
  const rpm=11800+Math.round(Math.random()*400);
  ['axX','axY','axZ','axRPM'].forEach((id,i)=>{
    const el=document.getElementById(id);
    if(!el)return;
    if(i===0)el.textContent=(bx>0?'+':'')+bx.toFixed(3);
    if(i===1)el.textContent=(by>0?'+':'')+by.toFixed(3);
    if(i===2)el.textContent=(bz>0?'+':'')+bz.toFixed(3);
    if(i===3)el.textContent=rpm;
  });
}, 400);

/* sequencer */
function showMachine(idx){
  const m=MACHINES[idx];
  mlabel.style.opacity='0'; statusEl.style.opacity='0';
  setTimeout(()=>{
    mlabel.textContent=m.label;
    statusEl.textContent=m.status;
    mlabel.style.opacity='1'; statusEl.style.opacity='1';
    // update title block sheet number
    if(titleSheet) titleSheet.innerHTML=`Scale: <span>1:1</span> &nbsp; Sheet: <span>${idx+1}/5</span>`;
  },200);
  activeWrap.innerHTML = m.svgFn(340,230);
  thumbEls.forEach((t,i)=>{ t.classList.toggle('current', i===idx); });
}

function shrinkAndNext(idx){
  thumbEls[idx].classList.add('show','current');
  activeWrap.style.transition=`all ${TRANS}ms cubic-bezier(.4,0,.2,1)`;
  activeWrap.style.opacity='0';
  activeWrap.style.transform='scale(0.3) translateY(70px)';
  setTimeout(()=>{
    activeWrap.style.transition='none';
    activeWrap.style.opacity='1';
    activeWrap.style.transform='scale(1) translateY(0)';
    const next=idx+1;
    if(next<MACHINES.length){
      thumbEls[idx].classList.remove('current');
      showMachine(next);
      setTimeout(()=>shrinkAndNext(next), STEP);
    } else {
      thumbEls[idx].classList.remove('current');
      setTimeout(exitLoader, 800);
    }
  }, TRANS);
}

function exitLoader(){
  loader.classList.add('exit');
  setTimeout(()=>{
    loader.style.display='none';
    const s=document.getElementById('main-site');
    if(s) s.style.display='flex';
  }, 800);
}

showMachine(0);
setTimeout(()=>shrinkAndNext(0), STEP);
</script>
